[build]
  base    = "artifacts/vrat-app"
  command = "pnpm install && pnpm run build"
  publish = "dist/public"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
